  <title>Réseau de partenaires — ClearHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--pr:#38bdf8;--bg:#040f1e;--card:#091828;--ac:#e0f2fe;
           --border:rgba(255,255,255,.08);--muted:rgba(241,245,249,.4);
           --text:#f1f5f9;--df:'Outfit',sans-serif;--bf:'Nunito',sans-serif;--r:14px}
    body{font-family:var(--bf);background:var(--bg);color:var(--text);min-height:100vh}
    /* TOPBAR */
    .topbar{display:flex;align-items:center;justify-content:space-between;
             padding:14px 32px;border-bottom:1px solid var(--border);
             background:rgba(0,0,0,.4);backdrop-filter:blur(12px);
             position:sticky;top:0;z-index:50}
    .back{font-size:.82rem;color:var(--muted);text-decoration:none;transition:color .2s}
    .back:hover{color:var(--text)}
    .topbar-badge{display:flex;align-items:center;gap:6px;font-size:.75rem;
                   color:var(--pr);font-weight:700}
    /* HERO */
    .hero{padding:60px 32px 48px;text-align:center;
           background:radial-gradient(ellipse at 50% 0%,#38bdf814 0%,transparent 65%)}
    .network-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 16px;
                   background:#38bdf818;border:1px solid #38bdf833;border-radius:20px;
                   font-size:.72rem;font-weight:700;color:#38bdf8;letter-spacing:1px;
                   margin-bottom:20px}
    .hero-title{font-family:var(--df);font-size:clamp(2rem,5vw,3.2rem);font-weight:800;
                 letter-spacing:-1.5px;margin-bottom:12px}
    .hero-sub{color:var(--muted);font-size:.95rem;max-width:500px;margin:0 auto 32px}
    /* SEARCH & FILTERS */
    .controls{max-width:880px;margin:0 auto;padding:0 32px 32px;
               display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .search-box{flex:1;min-width:220px;position:relative}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
                  color:var(--muted);font-size:.9rem}
    .search-input{width:100%;padding:11px 12px 11px 36px;
                   background:rgba(255,255,255,.07);border:1px solid var(--border);
                   border-radius:10px;color:var(--text);font-size:.88rem;
                   outline:none;font-family:var(--bf);transition:border-color .2s}
    .search-input:focus{border-color:var(--pr)}
    .search-input::placeholder{color:rgba(255,255,255,.25)}
    .filter-group{display:flex;gap:6px}
    .filter-btn{padding:8px 16px;border-radius:8px;font-size:.78rem;font-weight:600;
                 cursor:pointer;border:1px solid var(--border);
                 background:transparent;color:var(--muted);font-family:var(--bf);
                 transition:all .15s}
    .filter-btn:hover{background:rgba(255,255,255,.07);color:var(--text)}
    .filter-btn.active{background:var(--pr);border-color:var(--pr);color:#fff}
    .results-info{font-size:.75rem;color:var(--muted);padding:0 32px 12px;max-width:880px;margin:0 auto}
    /* GRID */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
           gap:16px;max-width:1100px;margin:0 auto;padding:0 32px 60px}
    .partner-card{background:rgba(255,255,255,.03);border:1px solid var(--border);
                   border-radius:var(--r);padding:22px;transition:all .2s;
                   display:flex;flex-direction:column;gap:10px}
    .partner-card:hover{border-color:#38bdf855;background:rgba(255,255,255,.05);
                         transform:translateY(-2px);box-shadow:0 8px 30px #38bdf818}
    .pc-head{display:flex;align-items:flex-start;gap:12px}
    .pc-emoji{font-size:2rem;flex-shrink:0}
    .pc-meta{flex:1;min-width:0}
    .pc-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.63rem;
               font-weight:700;letter-spacing:.5px;margin-bottom:5px}
    .badge-sim{background:#38bdf822;color:#38bdf8;border:1px solid #38bdf844}
    .badge-comp{background:#e0f2fe18;color:#e0f2fe;border:1px solid #e0f2fe40}
    .pc-name{font-weight:700;font-size:.98rem;margin-bottom:3px;
              overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pc-concept{font-size:.78rem;color:#38bdf8;font-weight:600}
    .pc-desc{font-size:.8rem;color:var(--muted);line-height:1.65;flex:1}
    .pc-actions{display:flex;gap:8px}
    .pc-btn{flex:1;padding:8px 12px;border-radius:8px;font-size:.78rem;font-weight:700;
             text-decoration:none;text-align:center;transition:all .15s}
    .pc-btn-pr{background:var(--pr);color:#fff}
    .pc-btn-pr:hover{opacity:.88}
    .pc-btn-ghost{border:1px solid var(--border);color:var(--muted)}
    .pc-btn-ghost:hover{border-color:var(--pr);color:var(--pr)}
    /* EMPTY / LOADING */
    .empty-state,.loading-state{text-align:center;padding:80px 32px;color:var(--muted)}
    .state-icon{font-size:3rem;margin-bottom:16px;display:block}
    @media(max-width:640px){
      .topbar{padding:10px 16px}
      .hero,.controls,.grid{padding-left:16px;padding-right:16px}
      .filter-group{flex-wrap:wrap}
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/" class="back">← ClearHub</a>
  <div class="topbar-badge">🔗 Réseau NeuroFactory</div>
  <a href="/login" style="font-size:.78rem;color:var(--pr);text-decoration:none;font-weight:600">
    Rejoindre le réseau →
  </a>
</div>

<div class="hero">
  <div class="network-pill">🔗 Réseau NeuroFactory</div>
  <h1 class="hero-title">Notre réseau de services</h1>
  <p class="hero-sub">Découvrez les plateformes similaires et complémentaires à ClearHub</p>
</div>

<div class="controls">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="q" placeholder="Rechercher un service…"
           oninput="filterPartners()">
  </div>
  <div class="filter-group">
    <button class="filter-btn active" onclick="setFilter('all',this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('similar',this)">Similaires</button>
    <button class="filter-btn" onclick="setFilter('complementary',this)">Complémentaires</button>
  </div>
</div>
<div class="results-info" id="results-info"></div>

<div id="partners-container">
  <div class="loading-state">
    <span class="state-icon" style="animation:spin 1s linear infinite;display:inline-block">⟳</span>
    <p>Chargement des partenaires…</p>
  </div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script src="cookies.js"></script>
<script>
let allPartners = [];
let currentFilter = 'all';

async function loadPartners() {
  try {
    const r = await fetch('/api/cross-promo?n=50');
    if (!r.ok) throw new Error('API error');
    const d = await r.json();
    allPartners = d.partners || [];
    render();
  } catch(e) {
    document.getElementById('partners-container').innerHTML =
      '<div class="empty-state"><span class="state-icon">🔍</span><p>Aucun partenaire disponible pour le moment.<br>Revenez bientôt !</p></div>';
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterPartners() {
  render();
}

function render() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const filtered = allPartners.filter(p => {
    const matchQ = !q || p.name.toLowerCase().includes(q) ||
                   p.concept.toLowerCase().includes(q) ||
                   (p.description||'').toLowerCase().includes(q);
    const matchF = currentFilter === 'all' ||
                   (currentFilter === 'similar' && p.score >= 3) ||
                   (currentFilter === 'complementary' && p.score < 3);
    return matchQ && matchF;
  });

  document.getElementById('results-info').textContent = filtered.length + ' partenaire' + (filtered.length !== 1 ? 's' : '');

  if (!filtered.length) {
    document.getElementById('partners-container').innerHTML =
      '<div class="empty-state"><span class="state-icon">🔍</span><p>Aucun partenaire trouvé.</p></div>';
    return;
  }

  document.getElementById('partners-container').innerHTML =
    '<div class="grid">' +
    filtered.map(p => {
      const isSim = p.score >= 3;
      const badgeClass = isSim ? 'badge-sim' : 'badge-comp';
      const badgeTxt   = isSim ? 'Similaire' : 'Complémentaire';
      const link  = p.url || p.payment_link || '#';
      const desc  = (p.description||'').slice(0,110);
      return `<div class="partner-card" data-score="${p.score}" data-type="${isSim?'similar':'complementary'}">
        <div class="pc-head">
          <span class="pc-emoji">${p.emoji}</span>
          <div class="pc-meta">
            <span class="pc-badge ${badgeClass}">${badgeTxt}</span>
            <div class="pc-name">${p.name}</div>
            <div class="pc-concept">${p.concept}</div>
          </div>
        </div>
        ${desc ? `<p class="pc-desc">${desc}${p.description?.length > 110 ? '…' : ''}</p>` : ''}
        <div class="pc-actions">
          <a href="${link}" class="pc-btn pc-btn-pr" target="_blank" rel="noopener sponsored">Découvrir →</a>
        </div>
      </div>`;
    }).join('') + '</div>';

  document.getElementById('results-info').textContent =
    filtered.length + ' partenaire' + (filtered.length > 1 ? 's' : '');
}

loadPartners();
</script>
</body></html>
