services:
  - type: web
    name: clearhub
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
